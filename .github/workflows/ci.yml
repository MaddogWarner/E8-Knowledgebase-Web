name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: services/web
      - name: Type check
        run: npm run typecheck
        working-directory: services/web
      - name: Lint
        run: npm run lint
        working-directory: services/web
      - name: Test
        run: npm test
        working-directory: services/web
      - name: Build
        run: npm run build
        working-directory: services/web
